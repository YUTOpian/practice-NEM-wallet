<!-- ============================================================
       起動画面
  ============================================================ -->
  <div id="welcome-page" class="page active">
    <div class="card">
      <h2>ウォレットを選択</h2>
      <p>利用するウォレットを選択してください。</p>
      <button id="select-sss" class="button-primary">SSSモード</button>
      <button id="select-local" class="button-primary">ローカルモード</button>
    </div>
  </div>

  <!-- ============================================================
       SSS接続画面
  ============================================================ -->
  <div id="sss-page" class="page">
    <div class="card">
      <h2>SSSモード</h2>
      <p>SSS Extensionと接続してください。</p>
      <button id="connect-sss" class="button-primary">SSS Extensionと接続</button>
      <button id="back-welcome-sss" class="button-secondary">← 戻る</button>
    </div>
  </div>

  <!-- ============================================================
       ローカルモード
  ============================================================ -->
  <div id="local-page" class="page">
    <div class="card">
      <h2>ローカルウォレット</h2>
      <p>利用方法を選択してください。</p>
      <button id="import-wallet" class="button-primary">ニーモニックをインポート</button>
      <button id="create-wallet" class="button-primary">新しいウォレットを作成</button>
      <button id="back-welcome-local" class="button-secondary">← 戻る</button>
    </div>
  </div>

  <!-- ============================================================
       ニーモニックインポート
  ============================================================ -->
  <div id="import-page" class="page">
    <div class="card">
      <h2>ニーモニックをインポート</h2>
      <textarea id="mnemonic-input" class="input-box" rows="6" placeholder="24単語をスペース区切りで入力してください"></textarea>
      <button id="btn-import-wallet" class="button-primary">インポート</button>
      <button id="back-local-import" class="button-secondary">← 戻る</button>
    </div>
  </div>

  <!-- ============================================================
       新規ウォレット作成
  ============================================================ -->
  <div id="create-page" class="page">
    <div class="card">
      <h2>新しいウォレット</h2>
      <p>以下のニーモニックを必ず控えてください。</p>
      <div id="generated-mnemonic" class="mnemonic-box">----</div>
      <label>
        <input type="checkbox" id="mnemonic-confirm"> バックアップしました
      </label>
      <button id="btn-next-pin" class="button-primary" disabled>次へ</button>
    </div>
  </div>

  <!-- ============================================================
       PIN設定
  ============================================================ -->
  <div id="pin-page" class="page">
    <div class="card">
      <h2>PIN設定</h2>
      <p>次回からPINだけで開けます。</p>
      <input id="pin1" type="password" class="input-box" placeholder="PIN">
      <input id="pin2" type="password" class="input-box" placeholder="PIN（確認）">
      <button id="btn-save-pin" class="button-primary">保存</button>
    </div>
  </div>
